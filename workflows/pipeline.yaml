main:
  steps:
    # 프로젝트 번호를 변수로 먼저 할당
    - init:
        assign:
          - project_number: ${sys.get_env("GOOGLE_CLOUD_PROJECT_NUMBER")}

    # Step 1: Bronze Job 실행 (실시간 수집)
    - run_bronze:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_number + "/jobs/realtime-job"}
          location: asia-northeast3
        result: bronze_result

    # Step 2: Silver Job 실행 (Bronze 성공 시에만)
    - run_silver:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_number + "/jobs/silver-job"}
          location: asia-northeast3
        result: silver_result

    # Step 3: 결과 반환
    - return_result:
        return:
          bronze: ${bronze_result}
          silver: ${silver_result}
