main:
  steps:
    # 프로젝트 ID를 변수로 먼저 할당
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}

    # Step 1: Bronze Job 실행 (실시간 수집)
    - run_bronze:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/realtime-job"}
          location: asia-northeast3
        result: bronze_result

    # Step 2: 결과 반환
    - return_result:
        return:
          bronze: ${bronze_result}
