steps:
  # ── Bronze Job ──────────────────────────────────────────

  # 1-1: Bronze 이미지 빌드
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/realtime-collector",
        "-f",
        "cloud_run/Dockerfile",
        ".",
      ]

  # 1-2: Bronze 이미지 푸시
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/realtime-collector"]

  # 1-3: Bronze Cloud Run Job 업데이트
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "update"
      - "realtime-job"
      - "--image"
      - "gcr.io/$PROJECT_ID/realtime-collector"
      - "--region"
      - "asia-northeast3"

  # ── Silver + Gold 통합 Job ───────────────────────────────

  # 2-1: Silver+Gold 이미지 빌드
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/silver-gold-collector",
        "-f",
        "cloud_run/Dockerfile.silver_gold",
        ".",
      ]

  # 2-2: Silver+Gold 이미지 푸시
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/silver-gold-collector"]

  # 2-3: Silver+Gold Cloud Run Job 업데이트
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "update"
      - "silver-gold-job"
      - "--image"
      - "gcr.io/$PROJECT_ID/silver-gold-collector"
      - "--region"
      - "asia-northeast3"

  # ── Cloud Workflows 배포 ─────────────────────────────────

  # 3-1: Bronze 전용 Workflow 배포 (실시간 수집 트리거용)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "workflows"
      - "deploy"
      - "bronze-pipeline"
      - "--source"
      - "workflows/pipeline.yaml"
      - "--location"
      - "asia-northeast3"

  # 3-2: Silver+Gold Workflow 배포 (오전 5시 배치용)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "workflows"
      - "deploy"
      - "silver-gold-pipeline"
      - "--source"
      - "workflows/silver_gold_pipeline.yaml"
      - "--location"
      - "asia-northeast3"

images:
  - "gcr.io/$PROJECT_ID/realtime-collector"
  - "gcr.io/$PROJECT_ID/silver-gold-collector"

options:
  logging: CLOUD_LOGGING_ONLY
