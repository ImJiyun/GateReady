steps:
  # ── Bronze Job ──────────────────────────────────────────

  # 1-1: Bronze 이미지 빌드
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/realtime-collector",
        "-f",
        "cloud_run/Dockerfile",
        ".",
      ]

  # 1-2: Bronze 이미지 푸시
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/realtime-collector"]

  # 1-3: Bronze Cloud Run Job 업데이트
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "update"
      - "realtime-job"
      - "--image"
      - "gcr.io/$PROJECT_ID/realtime-collector"
      - "--region"
      - "asia-northeast3"

  # ── Silver Job ──────────────────────────────────────────

  # 2-1: Silver 이미지 빌드
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/silver-collector",
        "-f",
        "cloud_run/Dockerfile.silver",
        ".",
      ]

  # 2-2: Silver 이미지 푸시
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/silver-collector"]

  # 2-3: Silver Cloud Run Job 업데이트
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "update"
      - "silver-job"
      - "--image"
      - "gcr.io/$PROJECT_ID/silver-collector"
      - "--region"
      - "asia-northeast3"

  # ── Cloud Workflows 배포 ─────────────────────────────────

  # 3: Workflows 정의 업데이트
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "workflows"
      - "deploy"
      - "bronze-silver-pipeline"
      - "--source"
      - "workflows/pipeline.yaml"
      - "--location"
      - "asia-northeast3"

images:
  - "gcr.io/$PROJECT_ID/realtime-collector"
  - "gcr.io/$PROJECT_ID/silver-collector"

options:
  logging: CLOUD_LOGGING_ONLY
